<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Send Message</title>
</head>
<body>
    <h1>Send Message</h1>
    <form method="post">
        {% csrf_token %}
        <label for="recipient">Recipient:</label><br>
        <input type="text" id="recipient" name="recipient" required><br><br>

        <label for="subject">Subject:</label><br>
        <input type="text" id="subject" name="subject" required><br><br>

        <label for="body">Message:</label><br>
        <textarea id="body" name="body" rows="4" cols="40" required></textarea><br><br>

        <label for="priority">Priority:</label><br>
        <select id="priority" name="priority">
            <option value="urgent">Urgent → urgent queue → worker_urgent</option>
            <option value="normal" selected>Normal → default queue → worker_default (priority 5)</option>
            <option value="low">Low → default queue → worker_default (priority 9)</option>
        </select><br><br>

        <button type="submit">Send</button>
    </form>
    <br>
    <a href="{% url 'results' %}">View Results</a>
    &nbsp;|&nbsp;
    <a href="http://localhost:5555" target="_blank">Flower (Celery Monitor)</a>
</body>
</html>
