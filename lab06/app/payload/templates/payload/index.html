<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Payload</title>
</head>
<body>
    <h1>Submit Payload</h1>
    <form method="post">
        {% csrf_token %}
        <label for="label">Label:</label><br>
        <input type="text" id="label" name="label" required><br><br>

        <label for="data">Data (payload text):</label><br>
        <textarea id="data" name="data" rows="4" cols="40" required></textarea><br><br>

        <button type="submit">Submit</button>
    </form>
    <br>
    <a href="{% url 'list' %}">View Results</a>
    &nbsp;|&nbsp;
    <a href="http://localhost:5555" target="_blank">Flower (Celery Monitor)</a>
</body>
</html>
